<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDSP Module Reviewer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

   <div id="menu-container">
    <h1>Alhamdulilah from <i>Ahak Na Ni Review Center</i> v2.0.0</h1>
    
    <div id="subject-menu">
        <p>Pili ug Subject, Engineer:</p>
        <div class="module-grid">
            <button class="module-btn" onclick="showLessons('Theory of Machines')">Theory of Machines</button>
            <button class="module-btn" onclick="showLessons('Machine Shop')">Machine Shop</button>
        </div>
    </div>

    <div id="lesson-menu" style="display: none;">
        <button onclick="backToSubjects()" style="background: none; border: none; color: #3498db; cursor: pointer; margin-bottom: 10px;">← Back to Subjects</button>
        <p id="lesson-title">Pili ug Lecture:</p>
        <div id="lesson-grid" class="module-grid">
            </div>
    </div>
</div>


    <div id="quiz-container" style="display: none;">
        <button id="home-btn" onclick="returnToMenu()">🏠 Back to Menu</button>
        
        <div id="question-area">
            <div id="progress-container" style="width: 100%; background-color: #ecf0f1; border-radius: 20px; margin-bottom: 25px; height: 14px; overflow: hidden; border: 1px solid #bdc3c7;">
    <div id="progress-bar" style="width: 0%; height: 100%; background-color: #27ae60; transition: width 0.4s ease-in-out;"></div>
    </div>
            <div id="question">Loading question...</div>
            <div id="choices"></div>
            <button id="next-btn" style="display: none; width: 100%; padding: 15px; margin-top: 20px; background-color: #3498db; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem;">
                Next Question →
            </button>
            <p id="result"></p>
        </div>

        <div id="completion-screen" style="display: none; text-align: center;">
            <h2>Lecture Complete!</h2>
            <p id="final-stats"></p>
            <p id="feedback-text"></p>
            <button class="module-btn" onclick="returnToMenu()">Back to Lectures</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
