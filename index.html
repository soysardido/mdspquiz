<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDSP Module Reviewer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="menu-container">
        <h1>Alhamdulilah from <i>Ahak Na Ni Review Center</i> version 1.g2.0</h1>
        <p>Pili ug Lecture, Engineer:</p>
        <div class="module-grid">
            <button class="module-btn" onclick="startModule('module1')">Lecture 1: Mechanisms</button>
            <button class="module-btn" onclick="startModule('module2')">Lecture 2: Motion</button>
            <button class="module-btn" onclick="startModule('module3')">Lecture 3: Linkages</button>
            <button class="module-btn" onclick="startModule('module4')">Lecture 4: Mobility</button>
            <button class="module-btn" onclick="startModule('module5')">Lecture 5: Grashof's Condition</button>
            <button class="module-btn" onclick="startModule('module6')">Lecture 6: Synthesis</button>
            <button class="module-btn" onclick="startModule('module7')">Lecture 7: Instant Centers</button>
        </div>
    </div>

    <div id="quiz-container" style="display: none;">
        <button id="home-btn" onclick="returnToMenu()">🏠 Back to Menu</button>
        
        <div id="question-area">
            <div id="progress-container" style="width: 100%; background-color: #ecf0f1; border-radius: 20px; margin-bottom: 25px; height: 14px; overflow: hidden; border: 1px solid #bdc3c7;">
    <div id="progress-bar" style="width: 0%; height: 100%; background-color: #27ae60; transition: width 0.4s ease-in-out;"></div>
</div>
            <div id="question">Loading question...</div>
            <div id="choices"></div>
            <p id="result"></p>
        </div>

        <div id="completion-screen" style="display: none; text-align: center;">
            <h2>Lecture Complete!</h2>
            <p id="final-stats"></p>
            <p id="feedback-text"></p>
            <button class="module-btn" onclick="returnToMenu()">Back to Lectures</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
